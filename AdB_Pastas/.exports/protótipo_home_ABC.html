const versionBtns = document.querySelectorAll('[data-set-version]');
const viewBtns = document.querySelectorAll('[data-set-view]');
const viewport = document.getElementById('viewport');

versionBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    versionBtns.forEach(b=>b.classList.remove('is-active'));
    btn.classList.add('is-active');
    document.querySelectorAll('.stage').forEach(s=>s.classList.remove('is-active'));
    document.getElementById('stage-'+btn.dataset.setVersion).classList.add('is-active');
  });
});
viewBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    viewBtns.forEach(b=>b.classList.remove('is-active'));
    btn.classList.add('is-active');
    viewport.classList.toggle('mobile', btn.dataset.setView === 'mobile');
  });
});
